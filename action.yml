name: 'RecordLoop'
description: 'AI-driven UI test recordings on every PR. Reads the diff, generates flows, replays with Playwright, posts a video comment.'
author: 'vihaanshahh'
branding:
  icon: 'video'
  color: 'blue'

inputs:
  openai-api-key:
    description: 'OpenAI API key. Used by the analyzer agent loop to read the PR diff and generate flows. Required when provider=openai.'
    required: false
    default: ''
  azure-openai-api-key:
    description: 'Azure OpenAI API key. Required when provider=azure.'
    required: false
    default: ''
  azure-openai-endpoint:
    description: 'Azure OpenAI resource endpoint, e.g. https://my-resource.openai.azure.com'
    required: false
    default: ''
  azure-openai-deployment:
    description: 'Azure OpenAI deployment name (used as the model identifier).'
    required: false
    default: ''
  provider:
    description: '"openai" (default) or "azure"'
    required: false
    default: 'openai'
  model:
    description: 'Model name. Defaults to gpt-5.4. Override to gpt-4o-mini for the cheapest setup.'
    required: false
    default: ''
  preview-url:
    description: 'PR preview deployment URL. If empty, the action posts planned flows but skips video recording.'
    required: false
    default: ''
  github-token:
    description: 'GitHub token with pull-requests:write. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  python-version:
    description: 'Python version to install on the runner.'
    required: false
    default: '3.12'

outputs:
  flows_count:
    description: 'Number of interaction flows generated by the agent.'
    value: ${{ steps.runner.outputs.flows_count }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install RecordLoop runtime (one package)
      shell: bash
      run: |
        python -m pip install --upgrade pip --quiet
        # Only the OpenAI SDK. The analyzer + github_client live in this
        # action's own checkout (${{ github.action_path }}) — no pip install
        # of RecordLoop itself.
        python -m pip install --quiet 'openai>=1.50.0'

    - name: Run RecordLoop analyzer
      id: runner
      shell: bash
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        AZURE_OPENAI_API_KEY: ${{ inputs.azure-openai-api-key }}
        AZURE_OPENAI_ENDPOINT: ${{ inputs.azure-openai-endpoint }}
        AZURE_OPENAI_DEPLOYMENT: ${{ inputs.azure-openai-deployment }}
        PROVIDER: ${{ inputs.provider }}
        MODEL: ${{ inputs.model }}
        PREVIEW_URL: ${{ inputs.preview-url }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if [ -z "${{ github.event.pull_request.number }}" ]; then
          echo "RecordLoop: not a pull_request event, skipping."
          exit 0
        fi
        # Add the action's own checkout to PYTHONPATH so we can import api.*
        export PYTHONPATH="${ACTION_PATH}:${PYTHONPATH}"
        python "${ACTION_PATH}/api/run_action.py"
