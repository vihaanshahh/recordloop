name: 'RecordLoop'
description: 'AI-driven UI test recordings on every PR. Reads the diff, generates flows, replays with Playwright, posts a video comment.'
author: 'vihaanshahh'
branding:
  icon: 'video'
  color: 'blue'

inputs:
  openai-api-key:
    description: 'OpenAI API key. Used by the analyzer agent loop to read the PR diff and generate flows. Required when provider=openai.'
    required: false
    default: ''
  azure-openai-api-key:
    description: 'Azure OpenAI API key. Required when provider=azure.'
    required: false
    default: ''
  azure-openai-endpoint:
    description: 'Azure OpenAI resource endpoint, e.g. https://my-resource.openai.azure.com'
    required: false
    default: ''
  azure-openai-deployment:
    description: 'Azure OpenAI deployment name (used as the model identifier).'
    required: false
    default: ''
  provider:
    description: '"openai" (default), "azure", or "anthropic"'
    required: false
    default: 'openai'
  model:
    description: 'Model name. Defaults to gpt-5.4 (openai/azure) or claude-opus-4-7 (anthropic). Override to gpt-4o-mini for the cheapest OpenAI setup.'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key. Required when provider=anthropic. Works for native Anthropic API and Azure AI Foundry (use the Foundry resource key).'
    required: false
    default: ''
  anthropic-base-url:
    description: 'Anthropic base URL. For native Anthropic API: https://api.anthropic.com/v1. For Azure AI Foundry: https://<resource>.services.ai.azure.com/api/projects/<project> (the action will append /messages).'
    required: false
    default: ''
  anthropic-api-version:
    description: 'Optional ?api-version= query param. Required for some Azure AI Foundry routes (e.g. 2024-12-01-preview).'
    required: false
    default: ''
  preview-url:
    description: 'PR preview deployment URL. If empty, the action posts planned flows but skips video recording.'
    required: false
    default: ''
  github-token:
    description: 'GitHub token with pull-requests:write. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  python-version:
    description: 'Python version to install on the runner.'
    required: false
    default: '3.12'
  auto-start:
    description: 'When preview-url is empty AND the repo has a package.json, automatically build and start the user app inside the runner so flows can be recorded against localhost. Set to "false" to disable.'
    required: false
    default: 'true'
  start-command:
    description: 'Override the auto-start command. Default tries: npm ci → npm run build (if present) → npm start (or npm run dev as fallback).'
    required: false
    default: ''
  start-port:
    description: 'Port to probe for the auto-started app. Default tries 3000, then 3001, 4173 (vite preview), 5173 (vite dev), 4321 (astro), 8080.'
    required: false
    default: ''
  node-version:
    description: 'Node version to install when auto-start is enabled.'
    required: false
    default: '20'
  storage-state:
    description: 'Base64-encoded Playwright storageState.json for authenticated pages. Store as a GitHub Secret.'
    required: false
    default: ''

outputs:
  flows_count:
    description: 'Number of interaction flows generated by the agent.'
    value: ${{ steps.runner.outputs.flows_count }}
  cost_usd:
    description: 'LLM cost for this PR run, in USD (e.g. 0.004213).'
    value: ${{ steps.runner.outputs.cost_usd }}
  input_tokens:
    description: 'Total LLM input tokens consumed.'
    value: ${{ steps.runner.outputs.input_tokens }}
  output_tokens:
    description: 'Total LLM output tokens generated.'
    value: ${{ steps.runner.outputs.output_tokens }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install RecordLoop runtime (one package)
      shell: bash
      run: |
        python -m pip install --upgrade pip --quiet
        # The OpenAI SDK + httpx (used directly for the anthropic provider's
        # raw POST to api.anthropic.com or Azure AI Foundry — no extra wheel
        # required). The analyzer + github_client live in this action's own
        # checkout (${{ github.action_path }}); no pip install of RecordLoop.
        python -m pip install --quiet 'openai>=1.50.0' 'pyyaml>=6.0' 'httpx>=0.27.0'

    - name: Install Playwright + ffmpeg (only when we're going to record)
      if: inputs.preview-url != '' || inputs.auto-start != 'false'
      shell: bash
      run: |
        python -m pip install --quiet 'playwright>=1.44.0'
        python -m playwright install --with-deps chromium
        # ffmpeg lets ensure_mp4() convert Playwright's raw .webm output to
        # .mp4 — smaller files, browser-friendly. ubuntu-latest usually has
        # it but installing explicitly costs ~5s and removes the assumption.
        if ! command -v ffmpeg >/dev/null 2>&1; then
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
        fi
        ffmpeg -version | head -1 || true

    - name: Checkout user repo (for auto-start)
      if: inputs.preview-url == '' && inputs.auto-start != 'false'
      uses: actions/checkout@v4
      with:
        path: __recordloop_target__
        fetch-depth: 0

    - name: Set up Node (for auto-start)
      if: inputs.preview-url == '' && inputs.auto-start != 'false'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Build and start user app in background
      if: inputs.preview-url == '' && inputs.auto-start != 'false'
      shell: bash
      env:
        START_COMMAND: ${{ inputs.start-command }}
        START_PORT: ${{ inputs.start-port }}
      run: |
        set -e
        cd __recordloop_target__

        if [ ! -f package.json ]; then
          echo "auto-start: no package.json found — skipping (will fall back to planned-flows mode)"
          exit 0
        fi

        echo "::group::Install dependencies"
        if [ -f package-lock.json ]; then
          npm ci --no-audit --no-fund --loglevel=error
        else
          npm install --no-audit --no-fund --loglevel=error
        fi
        echo "::endgroup::"

        if grep -q '"build"\s*:' package.json; then
          echo "::group::Build"
          npm run build --silent || { echo "build failed; trying to start without it"; }
          echo "::endgroup::"
        fi

        echo "::group::Start app in background"
        if [ -n "$START_COMMAND" ]; then
          echo "using START_COMMAND override: $START_COMMAND"
          nohup bash -c "$START_COMMAND" > /tmp/recordloop-app.log 2>&1 &
        elif grep -q '"start"\s*:' package.json; then
          echo "running: npm start"
          nohup npm start > /tmp/recordloop-app.log 2>&1 &
        elif grep -q '"dev"\s*:' package.json; then
          echo "running: npm run dev"
          nohup npm run dev > /tmp/recordloop-app.log 2>&1 &
        else
          echo "auto-start: no start or dev script found in package.json — skipping"
          exit 0
        fi
        APP_PID=$!
        echo "started PID=$APP_PID"
        echo "::endgroup::"

        # Probe for a live HTTP server. We try the common ports for Node web frameworks.
        if [ -n "$START_PORT" ]; then
          PORTS="$START_PORT"
        else
          PORTS="3000 3001 4173 5173 4321 8080"
        fi

        echo "::group::Wait for app to come up"
        DETECTED=""
        for attempt in $(seq 1 60); do
          for port in $PORTS; do
            if curl -sf -o /dev/null "http://localhost:$port/"; then
              DETECTED="http://localhost:$port"
              echo "✓ app responded on $DETECTED (after ${attempt}s)"
              break 2
            fi
          done
          sleep 1
        done

        if [ -z "$DETECTED" ]; then
          echo "✗ app did not come up within 60s on any of: $PORTS"
          echo "--- last 40 lines of /tmp/recordloop-app.log ---"
          tail -40 /tmp/recordloop-app.log || true
          echo "--- end log ---"
          # Don't fail the whole job — fall through to planned-flows mode
          exit 0
        fi
        echo "::endgroup::"

        echo "RECORDLOOP_DETECTED_URL=$DETECTED" >> "$GITHUB_ENV"

    - name: Run RecordLoop analyzer
      id: runner
      shell: bash
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        AZURE_OPENAI_API_KEY: ${{ inputs.azure-openai-api-key }}
        AZURE_OPENAI_ENDPOINT: ${{ inputs.azure-openai-endpoint }}
        AZURE_OPENAI_DEPLOYMENT: ${{ inputs.azure-openai-deployment }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_API_VERSION: ${{ inputs.anthropic-api-version }}
        PROVIDER: ${{ inputs.provider }}
        MODEL: ${{ inputs.model }}
        PREVIEW_URL: ${{ inputs.preview-url }}
        ACTION_PATH: ${{ github.action_path }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        RECORDLOOP_STORAGE_STATE: ${{ inputs.storage-state }}
        # Threaded into the PR comment so users can click straight to the
        # workflow run page where the video artifact is downloadable.
        WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -z "${{ github.event.pull_request.number }}" ]; then
          echo "RecordLoop: not a pull_request event, skipping."
          exit 0
        fi
        # Add the action's own checkout to PYTHONPATH so we can import api.*
        # AND src/ so cloud_recorder.py can import recordloop.capture.recorder
        # (the analyzer doesn't need it; only the recorder does).
        export PYTHONPATH="${ACTION_PATH}:${ACTION_PATH}/src:${PYTHONPATH}"
        python "${ACTION_PATH}/api/run_action.py"

    - name: List recorded video files (debug)
      if: always() && (inputs.preview-url != '' || inputs.auto-start != 'false')
      shell: bash
      run: |
        echo "--- /tmp/recordloop-videos/ ---"
        ls -la /tmp/recordloop-videos/ 2>/dev/null || echo "(directory does not exist)"

    - name: Upload recorded videos as workflow artifact
      if: always() && (inputs.preview-url != '' || inputs.auto-start != 'false')
      uses: actions/upload-artifact@v4
      with:
        name: recordloop-videos-pr-${{ github.event.pull_request.number }}
        path: |
          /tmp/recordloop-videos/*.mp4
          /tmp/recordloop-videos/*.webm
          /tmp/recordloop-videos/*.gif
        if-no-files-found: ignore
        retention-days: 14
