# RecordLoop — add this file to your repo's .github/workflows/
# That's it. One secret, zero other config.

name: RecordLoop

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: vihaanshahh/recordloop@main
        with:
          api_key: ${{ secrets.RECORDLOOP_API_KEY }}
          # preview_url is auto-detected from the PR body (Vercel/Netlify/etc.)
          # or you can set it explicitly:
          # preview_url: ${{ steps.deploy.outputs.url }}
