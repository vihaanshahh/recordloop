name: RecordLoop API smoke

on:
  push:
    paths:
      - "api/**"
      - "src/recordloop/**"
      - ".github/workflows/recordloop-api-smoke.yml"
  pull_request:
    paths:
      - "api/**"
      - "src/recordloop/**"

jobs:
  smoke:
    name: Tier 1 — zero-secret smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps (no playwright)
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest

      - name: Run smoke tests
        env:
          RECORDLOOP_DRY_RUN: "1"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: pytest api/tests/test_smoke.py -v
